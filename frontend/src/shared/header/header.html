<nav [class.scrolled]="scrolled" [class.hidden]="hidden">
  <div class="nav-logo" tabindex="0" (click)="router.navigate([''])" (keydown.enter)="router.navigate([''])">LOOKER</div>
  <div class="nav-right">
    <a routerLink="/" class="nav-link">Filmes</a>
    <a routerLink="/colecoes" class="nav-link">Coleções</a>
    <button class="nav-dice" (click)="openSurprise()" title="Surpreenda-me" aria-label="Surpreenda-me">
      <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true">
        <rect x="3.5" y="3.5" width="17" height="17" rx="3" fill="none" stroke="currentColor" stroke-width="1.6"/>
        <circle cx="8" cy="8" r="1.3" fill="currentColor"/>
        <circle cx="16" cy="8" r="1.3" fill="currentColor"/>
        <circle cx="12" cy="12" r="1.3" fill="currentColor"/>
        <circle cx="8" cy="16" r="1.3" fill="currentColor"/>
        <circle cx="16" cy="16" r="1.3" fill="currentColor"/>
      </svg>
      <span>Surpreenda-me</span>
    </button>

    <div class="search" [class.open]="searchOpen">
      <button class="search-toggle" *ngIf="!searchOpen" (click)="openSearch()" aria-label="Buscar filmes">
        <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true">
          <circle cx="11" cy="11" r="6" fill="none" stroke="currentColor" stroke-width="1.6"/>
          <path d="M20 20l-4-4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
      </button>

      <form *ngIf="searchOpen" class="search-form" (ngSubmit)="submitSearch()">
        <svg class="search-icon" viewBox="0 0 24 24" width="14" height="14" aria-hidden="true">
          <circle cx="11" cy="11" r="6" fill="none" stroke="currentColor" stroke-width="1.6"/>
          <path d="M20 20l-4-4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
        <input
          #searchInput
          class="search-input"
          type="text"

          placeholder="Buscar por título ou gênero…"
          [value]="searchTerm"
          (input)="onSearchInput($any($event.target).value)"
          (keydown.escape)="closeSearch()" />
        <button class="search-close" type="button" (click)="closeSearch()" aria-label="Fechar busca">&#x2715;</button>
      </form>

      <div class="search-dropdown" *ngIf="searchOpen && !searchTerm && searchHistory.length > 0">
        <div class="search-history-head">
          <span>Buscas recentes</span>
          <button type="button" class="search-history-clear" (click)="clearHistory($event)">Limpar</button>
        </div>
        <div class="search-history-list">
          <button
            type="button"
            class="search-chip"
            *ngFor="let term of searchHistory"
            (click)="pickHistory(term)">
            <svg viewBox="0 0 24 24" width="12" height="12" aria-hidden="true">
              <path d="M12 8v5l3 2" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round"/>
              <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.6" fill="none"/>
            </svg>
            <span>{{ term }}</span>
            <span class="chip-x" tabindex="0" (click)="removeHistory(term, $event)" (keydown.enter)="removeHistory(term, $event)" aria-label="Remover">&#x2715;</span>
          </button>
        </div>
      </div>

      <div class="search-dropdown" *ngIf="searchOpen && searchTerm">
        <div class="search-state" *ngIf="searchLoading">Buscando…</div>
        <div class="search-state" *ngIf="!searchLoading && searchResults.length === 0">
          Nada encontrado para "{{ searchTerm }}".
        </div>
        <button
          *ngFor="let r of searchResults"
          class="search-result"
          (click)="pickResult(r)">
          <img *ngIf="r.imagem_url" [src]="r.imagem_url" [alt]="r.titulo" />
          <div class="search-result-info">
            <span class="search-result-title">{{ r.titulo }}</span>
            <span class="search-result-meta">{{ r.genero }}</span>
          </div>
        </button>
        <button class="search-result search-all" *ngIf="searchResults.length > 0" (click)="submitSearch()">
          Ver todos os resultados para "{{ searchTerm }}" →
        </button>
      </div>
    </div>

    <button class="nav-theme" (click)="themeService.toggle()" [title]="themeService.theme === 'dark' ? 'Modo claro' : 'Modo escuro'">
      {{ themeService.theme === 'dark' ? '☀️' : '🌙' }}
    </button>
    <button *ngIf="!user" class="nav-enter" (click)="openLogin()">Entrar</button>

    <div *ngIf="user" class="user-menu">
      <button class="user-trigger" (click)="toggleMenu()" [class.open]="menuOpen">
        <span class="user-avatar">{{ initials }}</span>
        <span class="user-name">{{ user.nome }}</span>
        <span class="user-caret" aria-hidden="true">▾</span>
      </button>

      <div class="user-dropdown" *ngIf="menuOpen">
        <div class="user-dropdown-header">
          <span class="user-dropdown-name">{{ user.nome }}</span>
          <span class="user-dropdown-email">{{ user.email }}</span>
        </div>
        <button class="user-dropdown-item" (click)="goTo('/profile')">Meu perfil</button>
        <button class="user-dropdown-item" (click)="goTo('/favoritos')">Meus favoritos</button>
        <button class="user-dropdown-item" (click)="goTo('/watchlist')">Watchlist</button>
        <button class="user-dropdown-item" (click)="goTo('/meus-alugueis')">Meus aluguéis</button>
        <div class="user-dropdown-divider"></div>
        <button class="user-dropdown-item user-dropdown-item--danger" (click)="logout()">Sair</button>
      </div>
    </div>
  </div>
</nav>

<app-login
  *ngIf="loginVisible"
  [startVisible]="true"
  (loginSubmit)="handleLogin($event)"
  (registerSubmit)="handleRegister($event)"
  (closed)="closeLogin()">
</app-login>
