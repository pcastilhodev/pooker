server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Achados do scan OWASP ZAP: version banner e headers de seguranca ausentes.
    server_tokens off;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://image.tmdb.org; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://api.themoviedb.org; frame-src https://www.youtube.com; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'self';" always;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
