# backend/pyproject.toml
# Configuração compartilhada de análise estática para todos os serviços Python

[tool.ruff]
target-version = "py311"
line-length = 88

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "N",    # pep8-naming
    "UP",   # pyupgrade
    "B",    # flake8-bugbear
    "C90",  # mccabe complexity
    "S",    # flake8-bandit (security)
    "ANN",  # flake8-annotations (required type hints)
]
ignore = [
    "ANN101",  # missing-type-self (deprecated)
    "ANN102",  # missing-type-cls (deprecated)
]

[tool.ruff.lint.mccabe]
max-complexity = 10

[tool.ruff.lint.flake8-bugbear]
# Chamadas idiomáticas do FastAPI em argumentos default (Depends/Header/Query/etc.)
# não são mutáveis-compartilhadas; B008 é falso-positivo para esse padrão.
extend-immutable-calls = [
    "fastapi.Depends",
    "fastapi.Header",
    "fastapi.Query",
    "fastapi.Path",
    "fastapi.Cookie",
    "fastapi.File",
    "fastapi.Form",
    "fastapi.Body",
    "fastapi.Security",
]

[tool.ruff.lint.per-file-ignores]
"**/tests/**" = ["S101", "ANN"]  # allow assert and unannotated in tests
"**/alembic/**" = ["ALL"]        # ignore generated migration code

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.mypy]
python_version = "3.11"
strict = true
ignore_missing_imports = true
# Cada serviço roda `cd backend/<svc> && mypy app/`. Sem isto, o mypy descobre
# o mesmo arquivo sob dois nomes de módulo (ex.: "payment" e "app.routes.payment").
explicit_package_bases = true
namespace_packages = true
exclude = [
    ".*alembic.*",
    ".*__pycache__.*",
]
plugins = ["pydantic.mypy"]

[tool.pydantic-mypy]
init_forbid_extra = true
init_typed = true
warn_required_dynamic_aliases = true
