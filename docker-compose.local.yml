services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: trabalho_if
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d trabalho_if"]
      interval: 5s
      timeout: 3s
      retries: 12
    volumes:
      - pgdata_local:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata_local:
