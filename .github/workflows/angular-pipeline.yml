name: Angular Pipeline

on:
  workflow_dispatch:
  push:
    branches: [master, main, develop]
    paths:
      - 'frontend/**'
  pull_request:
    branches: [master, main, develop]
    paths:
      - 'frontend/**'

jobs:
  build-angular:
    runs-on: self-hosted
    timeout-minutes: 30

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v4

      - name: Setup Node
        id: setup-node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install dependencies
        id: install
        working-directory: frontend
        run: npm ci

      - name: Lint
        id: lint
        working-directory: frontend
        continue-on-error: true
        run: npm run lint

      - name: Patch Angular builder for lcov coverage
        id: patch-lcov
        working-directory: frontend
        run: |
          $file = "node_modules/@angular/build/src/builders/karma/application_builder.js"
          $content = Get-Content $file -Raw
          $content = $content.Replace(
            "reporters: [{ type: 'html' }, { type: 'text-summary' }],",
            "reporters: [{ type: 'html' }, { type: 'text-summary' }, { type: 'lcovonly', file: 'lcov.info' }],"
          )
          Set-Content $file $content -Encoding UTF8
          Write-Host "Patched Angular karma builder to include lcovonly reporter"

      - name: Test with coverage
        id: test
        working-directory: frontend
        run: npm run test -- --watch=false --browsers=ChromeHeadless --code-coverage

      - name: Upload test results
        id: upload-test-results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: angular-test-coverage
          path: frontend/coverage/

      - name: SonarQube scan + Quality Gate
        id: sonarqube
        if: vars.SONAR_ENABLED == 'true'
        working-directory: frontend
        run: |
          $version = "5.0.1.3006"
          $scannerDir = "$env:USERPROFILE\.sonar\sonar-scanner-$version-windows"
          if (-not (Test-Path $scannerDir)) {
            $zip = "$env:TEMP\sonar-scanner.zip"
            Invoke-WebRequest -Uri "https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-$version-windows.zip" -OutFile $zip
            Expand-Archive -Path $zip -DestinationPath "$env:USERPROFILE\.sonar" -Force
            Remove-Item $zip
          }
          & "$scannerDir\bin\sonar-scanner.bat" "-Dsonar.qualitygate.wait=true"
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Build production
        id: build-prod
        working-directory: frontend
        run: npm run build -- --configuration production

      - name: Build frontend Docker image (alvo do scan OWASP ZAP)
        id: docker-build
        run: docker build -t pooker/frontend:${{ github.sha }} -f frontend/Dockerfile frontend/

      - name: Start frontend container
        id: start-target
        run: docker run -d --name frontend-zap-${{ github.run_id }} -p 4200:80 pooker/frontend:${{ github.sha }}

      - name: Wait for frontend readiness
        id: wait-target
        run: |
          $ready = $false
          for ($i = 0; $i -lt 30; $i++) {
            try {
              $resp = Invoke-WebRequest -Uri "http://localhost:4200/" -UseBasicParsing -TimeoutSec 2
              if ($resp.StatusCode -eq 200) { $ready = $true; break }
            } catch {}
            Start-Sleep -Seconds 2
          }
          if (-not $ready) { throw "frontend nao respondeu a tempo em http://localhost:4200/" }

      - name: Run OWASP ZAP baseline scan
        id: zap-scan
        working-directory: frontend
        run: |
          New-Item -ItemType Directory -Force -Path zap-report | Out-Null
          docker run --rm -v "${PWD}\zap-report:/zap/wrk:rw" -t zaproxy/zap-stable zap-baseline.py `
            -t http://host.docker.internal:4200/ `
            -r zap-report.html `
            -J zap-report.json `
            -I

      - name: Upload ZAP report
        id: upload-zap-report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report-frontend
          path: frontend/zap-report/

      - name: Stop frontend container
        id: stop-target
        if: always()
        run: docker rm -f frontend-zap-${{ github.run_id }}
