name: Python Services CI/CD Pipeline

on:
  workflow_dispatch:
  push:
    branches: [master, main, develop]
    paths:
      - 'backend/alugueis-service/**'
      - 'backend/filmes-service/**'
      - 'backend/user-service/**'
      - 'backend/payment-service/**'
  pull_request:
    branches: [master, main, develop]
    paths:
      - 'backend/alugueis-service/**'
      - 'backend/filmes-service/**'
      - 'backend/user-service/**'
      - 'backend/payment-service/**'

jobs:
  build-python-service:
    runs-on: self-hosted
    timeout-minutes: 30
    strategy:
      matrix:
        service: [alugueis-service, filmes-service, user-service, payment-service]
      fail-fast: false

    steps:
      - name: Checkout repository
        id: checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        id: cache-pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.service }}-${{ hashFiles(format('backend/{0}/requirements.txt', matrix.service)) }}

      - name: Install dependencies
        id: install-deps
        working-directory: backend/${{ matrix.service }}
        run: |
          if (Test-Path requirements.txt) { pip install -r requirements.txt }
          pip install pytest pytest-cov flake8

      - name: Lint with flake8
        id: lint
        working-directory: backend/${{ matrix.service }}
        run: flake8 app/ --count --select=E9,F821,F822,F823 --show-source --statistics

      - name: Run tests with coverage
        id: test-coverage
        working-directory: backend/${{ matrix.service }}
        run: pytest --junitxml=report.xml -v --cov=app --cov-report=xml:coverage.xml

      - name: Start Postgres for integration tests
        id: start-integration-db
        if: matrix.service != 'payment-service'
        run: docker compose -f docker-compose.test.yml up -d --wait

      - name: Run integration tests (real Postgres)
        id: integration-tests
        if: matrix.service != 'payment-service'
        working-directory: backend/${{ matrix.service }}
        env:
          INTEGRATION_DATABASE_URL: postgresql://postgres:postgres@localhost:5433/trabalho_if
          INTEGRATION_DB_HOST: localhost
          INTEGRATION_DB_PORT: "5433"
          INTEGRATION_DB_NAME: trabalho_if
          INTEGRATION_DB_USER: postgres
          INTEGRATION_DB_PASSWORD: postgres
        run: pytest tests/integration -o addopts="" --junitxml=report-integration.xml -v --cov=app --cov-report=xml:coverage-integration.xml

      - name: Stop Postgres for integration tests
        id: stop-integration-db
        if: always() && matrix.service != 'payment-service'
        run: docker compose -f docker-compose.test.yml down -v

      - name: Upload test results
        id: upload-test-results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-test-results-${{ matrix.service }}
          path: |
            backend/${{ matrix.service }}/report.xml
            backend/${{ matrix.service }}/report-integration.xml

      - name: SonarQube scan + Quality Gate
        id: sonarqube
        if: vars.SONAR_ENABLED == 'true'
        working-directory: backend/${{ matrix.service }}
        run: |
          $version = "5.0.1.3006"
          $scannerDir = "$env:USERPROFILE\.sonar\sonar-scanner-$version-windows"
          if (-not (Test-Path $scannerDir)) {
            $zip = "$env:TEMP\sonar-scanner.zip"
            Invoke-WebRequest -Uri "https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-$version-windows.zip" -OutFile $zip
            Expand-Archive -Path $zip -DestinationPath "$env:USERPROFILE\.sonar" -Force
            Remove-Item $zip
          }
          & "$scannerDir\bin\sonar-scanner.bat" "-Dsonar.qualitygate.wait=true"
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Docker build
        id: docker-build
        if: vars.SONAR_ENABLED == 'true'
        run: docker build -t pooker/${{ matrix.service }}:${{ github.sha }} backend/${{ matrix.service }}/
