name: Security Scan (OWASP ZAP API Scan)

on:
  workflow_dispatch:
  push:
    branches: [master, main, develop]
    paths:
      - 'backend/filmes-service/**'
      - 'docker-compose.test.yml'
      - '.github/workflows/security-scan.yml'
  pull_request:
    branches: [master, main, develop]
    paths:
      - 'backend/filmes-service/**'
      - 'docker-compose.test.yml'
      - '.github/workflows/security-scan.yml'

jobs:
  zap-api-scan:
    runs-on: self-hosted
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        id: checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install filmes-service dependencies
        id: install-deps
        working-directory: backend/filmes-service
        run: pip install -r requirements.txt

      - name: Start test Postgres
        id: start-db
        run: docker compose -f docker-compose.test.yml up -d --wait

      - name: Start filmes-service (alvo da varredura)
        id: start-target
        working-directory: backend/filmes-service
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5433/trabalho_if
        run: |
          $proc = Start-Process -PassThru -NoNewWindow -FilePath python `
            -ArgumentList "-m", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8003"
          $proc.Id | Out-File -FilePath "$env:RUNNER_TEMP\filmes-service.pid"

      - name: Wait for filmes-service readiness
        id: wait-target
        run: |
          $ready = $false
          for ($i = 0; $i -lt 30; $i++) {
            try {
              $resp = Invoke-WebRequest -Uri "http://localhost:8003/" -UseBasicParsing -TimeoutSec 2
              if ($resp.StatusCode -eq 200) { $ready = $true; break }
            } catch {}
            Start-Sleep -Seconds 2
          }
          if (-not $ready) { throw "filmes-service nao respondeu a tempo em http://localhost:8003/" }

      - name: Run OWASP ZAP API scan (baseado no OpenAPI do filmes-service)
        id: zap-scan
        run: |
          New-Item -ItemType Directory -Force -Path zap-report | Out-Null
          docker run --rm -v "${PWD}\zap-report:/zap/wrk:rw" -t zaproxy/zap-stable zap-api-scan.py `
            -t http://host.docker.internal:8003/openapi.json `
            -f openapi `
            -r zap-report.html `
            -J zap-report.json `
            -I

      - name: Upload ZAP report
        id: upload-zap-report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-api-scan-report
          path: zap-report/

      - name: Stop filmes-service
        id: stop-target
        if: always()
        run: |
          $pidFile = "$env:RUNNER_TEMP\filmes-service.pid"
          if (Test-Path $pidFile) {
            $targetPid = Get-Content $pidFile
            Stop-Process -Id $targetPid -Force -ErrorAction SilentlyContinue
            Remove-Item $pidFile -ErrorAction SilentlyContinue
          }

      - name: Stop test Postgres
        id: stop-db
        if: always()
        run: docker compose -f docker-compose.test.yml down -v
