name: Java CI/CD Pipeline

on:
  workflow_dispatch:
  push:
    branches: [master, main, develop]
    paths:
      - 'backend/api-gateway/**'
      - 'backend/auth-service/**'
  pull_request:
    branches: [master, main, develop]
    paths:
      - 'backend/api-gateway/**'
      - 'backend/auth-service/**'

jobs:
  build-apigateway:
    name: Build & Test API Gateway
    runs-on: self-hosted

    steps:
      - id: checkout
        name: Checkout source code
        uses: actions/checkout@v4

      - id: setup-java
        name: Set up Java 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - id: cache-gradle
        name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('backend/api-gateway/**/*.gradle*', 'backend/api-gateway/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - id: build-no-tests
        name: Build API Gateway (skip tests)
        working-directory: backend/api-gateway
        run: .\gradlew.bat build -x test

      - id: test
        name: Run API Gateway tests
        working-directory: backend/api-gateway
        run: .\gradlew.bat test

      - id: upload-test-results
        name: Upload API Gateway test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: apigateway-test-results
          path: backend/api-gateway/build/test-results/**/*.xml

      - id: coverage-report
        name: Generate API Gateway coverage report
        working-directory: backend/api-gateway
        run: .\gradlew.bat jacocoTestReport

      - id: start-target
        name: Start API Gateway (alvo do scan OWASP ZAP)
        working-directory: backend/api-gateway
        run: |
          $jar = Get-ChildItem -Path "build/libs" -Filter "api-gateway-*.jar" | Where-Object { $_.Name -notlike "*-plain.jar" } | Select-Object -First 1
          $logPath = "$env:RUNNER_TEMP\api-gateway.log"
          $proc = Start-Process -PassThru -NoNewWindow -FilePath java -ArgumentList "-Djava.awt.headless=true", "-jar", $jar.FullName -RedirectStandardOutput $logPath -RedirectStandardError "$env:RUNNER_TEMP\api-gateway.err.log"
          $proc.Id | Out-File -FilePath "$env:RUNNER_TEMP\api-gateway.pid"

      - id: wait-target
        name: Wait for API Gateway readiness
        run: |
          $ready = $false
          $dumped = $false
          for ($i = 0; $i -lt 30; $i++) {
            try {
              Invoke-WebRequest -Uri "http://localhost:8080/" -UseBasicParsing -TimeoutSec 2 | Out-Null
              $ready = $true; break
            } catch {
              if ($_.Exception.Response) { $ready = $true; break }
            }
            if (-not $dumped -and $i -eq 15) {
              $dumped = $true
              $targetPid = Get-Content "$env:RUNNER_TEMP\api-gateway.pid" -ErrorAction SilentlyContinue
              if ($targetPid) {
                Write-Host "---- jstack pid $targetPid (aos 30s de espera) ----"
                try { & jstack $targetPid 2>$null | Write-Host } catch { Write-Host "jstack falhou: $_" }
              }
            }
            Start-Sleep -Seconds 2
          }
          if (-not $ready) {
            Write-Host "---- api-gateway stdout ----"
            Get-Content "$env:RUNNER_TEMP\api-gateway.log" -ErrorAction SilentlyContinue
            Write-Host "---- api-gateway stderr ----"
            Get-Content "$env:RUNNER_TEMP\api-gateway.err.log" -ErrorAction SilentlyContinue
            throw "api-gateway nao respondeu a tempo em http://localhost:8080/"
          }

      - id: upload-apigateway-log
        name: Upload API Gateway boot log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: apigateway-boot-log
          path: |
            ${{ runner.temp }}\api-gateway.log
            ${{ runner.temp }}\api-gateway.err.log
          if-no-files-found: ignore

      - id: zap-scan
        name: Run OWASP ZAP baseline scan
        working-directory: backend/api-gateway
        run: |
          New-Item -ItemType Directory -Force -Path zap-report | Out-Null
          docker run --rm -v "${PWD}\zap-report:/zap/wrk:rw" -t zaproxy/zap-stable zap-baseline.py `
            -t http://host.docker.internal:8080/ `
            -r zap-report.html `
            -J zap-report.json `
            -I

      - id: upload-zap-report
        name: Upload ZAP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report-api-gateway
          path: backend/api-gateway/zap-report/

      - id: stop-target
        name: Stop API Gateway
        if: always()
        run: |
          $pidFile = "$env:RUNNER_TEMP\api-gateway.pid"
          if (Test-Path $pidFile) {
            $targetPid = Get-Content $pidFile
            Stop-Process -Id $targetPid -Force -ErrorAction SilentlyContinue
            Remove-Item $pidFile -ErrorAction SilentlyContinue
          }

      - id: sonarqube
        name: SonarQube scan + Quality Gate
        if: vars.SONAR_ENABLED == 'true'
        working-directory: backend/api-gateway
        run: |
          $version = "5.0.1.3006"
          $scannerDir = "$env:USERPROFILE\.sonar\sonar-scanner-$version-windows"
          if (-not (Test-Path $scannerDir)) {
            $zip = "$env:TEMP\sonar-scanner.zip"
            Invoke-WebRequest -Uri "https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-$version-windows.zip" -OutFile $zip
            Expand-Archive -Path $zip -DestinationPath "$env:USERPROFILE\.sonar" -Force
            Remove-Item $zip
          }
          & "$scannerDir\bin\sonar-scanner.bat" "-Dsonar.qualitygate.wait=true"
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - id: docker-build
        name: Build API Gateway Docker image
        if: vars.SONAR_ENABLED == 'true'
        run: docker build -t pooker/api-gateway:${{ github.sha }} backend/api-gateway/

  build-auth-service:
    name: Build & Test Auth Service
    runs-on: self-hosted

    steps:
      - id: checkout
        name: Checkout source code
        uses: actions/checkout@v4

      - id: setup-java
        name: Set up Java 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - id: cache-maven
        name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('backend/auth-service/**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - id: build-no-tests
        name: Build Auth Service (skip tests)
        working-directory: backend/auth-service
        run: .\mvnw.cmd package -DskipTests

      - id: test
        name: Run Auth Service tests
        working-directory: backend/auth-service
        run: .\mvnw.cmd test

      - id: upload-test-results
        name: Upload Auth Service test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: auth-service-test-results
          path: backend/auth-service/target/surefire-reports/**/*.xml

      - id: coverage-report
        name: Generate Auth Service coverage report
        working-directory: backend/auth-service
        run: .\mvnw.cmd jacoco:report

      - id: start-test-db
        name: Start Postgres for OWASP ZAP scan
        run: docker compose -f docker-compose.test.yml up -d --wait

      - id: start-target
        name: Start Auth Service (alvo do scan OWASP ZAP)
        working-directory: backend/auth-service
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5433/trabalho_if
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: postgres
        run: |
          $jar = Get-ChildItem -Path "target" -Filter "*.jar" | Where-Object { $_.Name -notlike "*sources*" } | Select-Object -First 1
          $logPath = "$env:RUNNER_TEMP\auth-service.log"
          $proc = Start-Process -PassThru -NoNewWindow -FilePath java -ArgumentList "-Djava.awt.headless=true", "-jar", $jar.FullName, "--server.port=8081" -RedirectStandardOutput $logPath -RedirectStandardError "$env:RUNNER_TEMP\auth-service.err.log"
          $proc.Id | Out-File -FilePath "$env:RUNNER_TEMP\auth-service.pid"

      - id: wait-target
        name: Wait for Auth Service readiness
        run: |
          $ready = $false
          $dumped = $false
          for ($i = 0; $i -lt 40; $i++) {
            try {
              $resp = Invoke-WebRequest -Uri "http://localhost:8081/v1/api/debug/headers" -UseBasicParsing -TimeoutSec 2
              if ($resp.StatusCode -eq 200) { $ready = $true; break }
            } catch {}
            if (-not $dumped -and $i -eq 20) {
              $dumped = $true
              $targetPid = Get-Content "$env:RUNNER_TEMP\auth-service.pid" -ErrorAction SilentlyContinue
              if ($targetPid) {
                Write-Host "---- jstack pid $targetPid (aos 40s de espera) ----"
                try { & jstack $targetPid 2>$null | Write-Host } catch { Write-Host "jstack falhou: $_" }
              }
            }
            Start-Sleep -Seconds 2
          }
          if (-not $ready) {
            Write-Host "---- auth-service stdout ----"
            Get-Content "$env:RUNNER_TEMP\auth-service.log" -ErrorAction SilentlyContinue
            Write-Host "---- auth-service stderr ----"
            Get-Content "$env:RUNNER_TEMP\auth-service.err.log" -ErrorAction SilentlyContinue
            throw "auth-service nao respondeu a tempo em http://localhost:8081/"
          }

      - id: upload-auth-service-log
        name: Upload Auth Service boot log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: auth-service-boot-log
          path: |
            ${{ runner.temp }}\auth-service.log
            ${{ runner.temp }}\auth-service.err.log
          if-no-files-found: ignore

      - id: zap-scan
        name: Run OWASP ZAP baseline scan
        working-directory: backend/auth-service
        run: |
          New-Item -ItemType Directory -Force -Path zap-report | Out-Null
          docker run --rm -v "${PWD}\zap-report:/zap/wrk:rw" -t zaproxy/zap-stable zap-baseline.py `
            -t http://host.docker.internal:8081/v1/api/debug/headers `
            -r zap-report.html `
            -J zap-report.json `
            -I

      - id: upload-zap-report
        name: Upload ZAP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report-auth-service
          path: backend/auth-service/zap-report/

      - id: stop-target
        name: Stop Auth Service
        if: always()
        run: |
          $pidFile = "$env:RUNNER_TEMP\auth-service.pid"
          if (Test-Path $pidFile) {
            $targetPid = Get-Content $pidFile
            Stop-Process -Id $targetPid -Force -ErrorAction SilentlyContinue
            Remove-Item $pidFile -ErrorAction SilentlyContinue
          }

      - id: stop-test-db
        name: Stop Postgres for OWASP ZAP scan
        if: always()
        run: docker compose -f docker-compose.test.yml down -v

      - id: sonarqube
        name: SonarQube scan + Quality Gate
        if: vars.SONAR_ENABLED == 'true'
        working-directory: backend/auth-service
        run: |
          $version = "5.0.1.3006"
          $scannerDir = "$env:USERPROFILE\.sonar\sonar-scanner-$version-windows"
          if (-not (Test-Path $scannerDir)) {
            $zip = "$env:TEMP\sonar-scanner.zip"
            Invoke-WebRequest -Uri "https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-$version-windows.zip" -OutFile $zip
            Expand-Archive -Path $zip -DestinationPath "$env:USERPROFILE\.sonar" -Force
            Remove-Item $zip
          }
          & "$scannerDir\bin\sonar-scanner.bat" "-Dsonar.qualitygate.wait=true"
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - id: docker-build
        name: Build Auth Service Docker image
        if: vars.SONAR_ENABLED == 'true'
        run: docker build -t pooker/auth-service:${{ github.sha }} backend/auth-service/
