name: Java CI/CD Pipeline

on:
  workflow_dispatch:
  push:
    branches: [master, main, develop]
    paths:
      - 'backend/api-gateway/**'
      - 'backend/auth-service/**'
  pull_request:
    branches: [master, main, develop]
    paths:
      - 'backend/api-gateway/**'
      - 'backend/auth-service/**'

jobs:
  build-apigateway:
    name: Build & Test API Gateway
    runs-on: self-hosted

    steps:
      - id: checkout
        name: Checkout source code
        uses: actions/checkout@v4

      - id: setup-java
        name: Set up Java 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - id: cache-gradle
        name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('backend/api-gateway/**/*.gradle*', 'backend/api-gateway/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - id: build-no-tests
        name: Build API Gateway (skip tests)
        working-directory: backend/api-gateway
        run: .\gradlew.bat build -x test

      - id: test
        name: Run API Gateway tests
        working-directory: backend/api-gateway
        run: .\gradlew.bat test

      - id: upload-test-results
        name: Upload API Gateway test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: apigateway-test-results
          path: backend/api-gateway/build/test-results/**/*.xml

      - id: coverage-report
        name: Generate API Gateway coverage report
        working-directory: backend/api-gateway
        run: .\gradlew.bat jacocoTestReport

      - id: sonarqube
        name: SonarQube scan + Quality Gate
        if: vars.SONAR_ENABLED == 'true'
        working-directory: backend/api-gateway
        run: |
          $version = "5.0.1.3006"
          $scannerDir = "$env:USERPROFILE\.sonar\sonar-scanner-$version-windows"
          if (-not (Test-Path $scannerDir)) {
            $zip = "$env:TEMP\sonar-scanner.zip"
            Invoke-WebRequest -Uri "https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-$version-windows.zip" -OutFile $zip
            Expand-Archive -Path $zip -DestinationPath "$env:USERPROFILE\.sonar" -Force
            Remove-Item $zip
          }
          & "$scannerDir\bin\sonar-scanner.bat" "-Dsonar.qualitygate.wait=true"
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - id: docker-build
        name: Build API Gateway Docker image
        if: vars.SONAR_ENABLED == 'true'
        run: docker build -t pooker/api-gateway:${{ github.sha }} backend/api-gateway/

  build-auth-service:
    name: Build & Test Auth Service
    runs-on: self-hosted

    steps:
      - id: checkout
        name: Checkout source code
        uses: actions/checkout@v4

      - id: setup-java
        name: Set up Java 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - id: cache-maven
        name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('backend/auth-service/**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - id: build-no-tests
        name: Build Auth Service (skip tests)
        working-directory: backend/auth-service
        run: .\mvnw.cmd package -DskipTests

      - id: test
        name: Run Auth Service tests
        working-directory: backend/auth-service
        run: .\mvnw.cmd test

      - id: upload-test-results
        name: Upload Auth Service test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: auth-service-test-results
          path: backend/auth-service/target/surefire-reports/**/*.xml

      - id: coverage-report
        name: Generate Auth Service coverage report
        working-directory: backend/auth-service
        run: .\mvnw.cmd jacoco:report

      - id: sonarqube
        name: SonarQube scan + Quality Gate
        if: vars.SONAR_ENABLED == 'true'
        working-directory: backend/auth-service
        run: |
          $version = "5.0.1.3006"
          $scannerDir = "$env:USERPROFILE\.sonar\sonar-scanner-$version-windows"
          if (-not (Test-Path $scannerDir)) {
            $zip = "$env:TEMP\sonar-scanner.zip"
            Invoke-WebRequest -Uri "https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-$version-windows.zip" -OutFile $zip
            Expand-Archive -Path $zip -DestinationPath "$env:USERPROFILE\.sonar" -Force
            Remove-Item $zip
          }
          & "$scannerDir\bin\sonar-scanner.bat" "-Dsonar.qualitygate.wait=true"
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - id: docker-build
        name: Build Auth Service Docker image
        if: vars.SONAR_ENABLED == 'true'
        run: docker build -t pooker/auth-service:${{ github.sha }} backend/auth-service/
